<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exametrics Library</title>
    <meta name="theme-color" content="#0f7b6c" />
    <meta
      name="description"
      content="Browse, import, export, and manage the saved study sets on this device."
    />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <script src="shared.js" defer></script>
    <script src="library.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">Local set manager</p>
        <h1>Exametrics Library</h1>
        <p class="hero-copy">
          Browse the saved sets in this browser, import or export them, or jump straight back into studying.
        </p>
      </header>

      <main class="main-panel">
        <section class="library-page">
          <div class="library-toolbar">
            <div class="section-heading">
              <p class="section-kicker">Saved on this device</p>
              <h2>Browse your set library</h2>
            </div>

            <div class="library-toolbar-actions">
              <a href="index.html" class="button button-primary button-link">Back to Study Page</a>
              <a href="ai-builder.html" class="button button-ghost button-link">Open AI Set Builder</a>
              <a href="builder.html" class="button button-ghost button-link">Open Set Builder</a>
              <label class="button button-secondary upload-button" for="library-import-input">
                Import Study Set
              </label>
            </div>
            <input
              id="library-import-input"
              type="file"
              accept=".json,.txt,.md,application/json,text/plain"
              hidden
            />
          </div>

          <p id="library-message" class="setup-message" aria-live="polite"></p>
          <div id="library-list" class="saved-sets-list library-list"></div>
        </section>
      </main>
    </div>
  </body>
</html>
